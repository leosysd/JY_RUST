name: build-release

# 在 GitHub 上编译 jy / jy-bot 两个二进制并发布到 Release，VPS 直接下载安装（无需在 VPS 编译）。
#  · push 到 main 或手动触发 → 刷新滚动版 `latest`（预发布），install-bin.sh 默认拉它。
#  · push v* 标签 → 发布对应版本（如 v0.1.0）。
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    # 用 22.04（glibc 2.35）做兼容基线：产物可跑在 Ubuntu 22.04+/Debian 12+ 等较新发行版。
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release (jy + jy-bot)
        run: cargo build --release

      - name: Stage & checksum
        run: |
          mkdir -p dist
          cp target/release/jy-bot dist/jy-bot
          cp target/release/jy     dist/jy
          strip dist/jy-bot dist/jy || true
          (cd dist && sha256sum jy jy-bot > SHA256SUMS)
          ls -la dist

      - name: Resolve tag
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "rolling=false" >> "$GITHUB_OUTPUT"
          else
            echo "name=latest" >> "$GITHUB_OUTPUT"
            echo "rolling=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.name }}"
          if [[ "${{ steps.tag.outputs.rolling }}" == "true" ]]; then
            # 滚动 latest：先删旧 release + tag，再以当前 commit 重建，保证下载到最新二进制。
            gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null \
              || gh release delete "$TAG" --yes 2>/dev/null || true
            git push origin --delete "$TAG" 2>/dev/null || true
            gh release create "$TAG" dist/jy dist/jy-bot dist/SHA256SUMS \
              --title "latest (${GITHUB_SHA::7})" \
              --notes "Rolling build from main @ ${GITHUB_SHA::7}" \
              --prerelease --target "$GITHUB_SHA"
          else
            gh release create "$TAG" dist/jy dist/jy-bot dist/SHA256SUMS \
              --title "$TAG" --notes "Release $TAG" --target "$GITHUB_SHA"
          fi
